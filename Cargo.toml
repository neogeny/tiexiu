[package]
name = "TieXiu"
version = "0.1.1-alpha.2"
edition = "2024"
authors = ["Juancarlo Añez <apalala@gmail.com>"]
description = "A port of the TatSu PEG parser generator to Rust"
license = "MIT OR Apache-2.0"
repository = "https://github.com/neogeny/tiexiu"
readme = "README.md"
exclude = [
    "pyproject.toml",
    "__pycache__",
]

[features]
default = ["regex", "serde", "serde_json"]
regex = ["dep:regex"]
serde = ["dep:serde"]
serde_json = ["dep:serde", "dep:serde_json"]

[dependencies]
serde = { version = "1.0", features = ["derive"], optional = true }
regex = { version = "1.10", optional = true }
serde_json = { version = "1.0.149", optional = true }
pyo3 = { version = "0.28.2", features = ["extension-module"]}
clap = { version = "4.6.0", features = ["derive"] }
# indexmap = { version = "2.0" }


[[bin]]
name = "tiexiuc"
path = "src/main.rs"

[lib]
name = "tiexiu"
crate-type = ["cdylib", "rlib"]

[dev-dependencies]
criterion = { version = "4.4.1", package = "codspeed-criterion-compat" }

[[bench]]
name = "parsing"
harness = false

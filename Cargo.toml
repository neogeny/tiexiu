[package]
name = "TieXiu"
version = "0.1.1-alpha.2"
edition = "2024"
authors = ["Juancarlo Añez <apalala@gmail.com>"]
description = "A port of the TatSu PEG parser generator to Rust"
license = "MIT OR Apache-2.0"
repository = "https://github.com/neogeny/tiexiu"
readme = "README.md"
exclude = [
    "pyproject.toml",
    "__pycache__",
]

[features]
# The CLI is now an optional feature, included in default
default = ["regex", "serde", "serde_json", "cli"]
transient = ["regex", "serde", "serde_json", "cli"]

# Core features
regex = ["dep:regex"]
serde = ["dep:serde"]
serde_json = [
    "dep:serde",
    "dep:serde_json",
    "dep:serde_path_to_error",
]

# CLI-specific feature group
cli = ["dep:clap", "dep:syntect", "dep:owo-colors"]

[dependencies]
# Optional core dependencies
serde = { version = "1.0", features = ["derive"], optional = true }
regex = { version = "1.10", optional = true }
serde_json = { version = "1.0.149", optional = true }
serde_path_to_error = { version = "0.1", optional = true }

# CLI dependencies (marked as optional)
clap = { version = "4.6", features = ["derive"], optional = true }
syntect = { version = "5.3.0", optional = true }
owo-colors = { version = "4.0", optional = true, features = ["supports-colors"] }

# Mandatory/Library dependencies
pyo3 = { version = "0.28", features = ["extension-module"] }
indexmap = { version = "2.13" }
thiserror = "2.0.18"

[[bin]]
name = "tiexiu"
path = "src/main.rs"
# The binary will only compile if the 'cli' feature is present
required-features = ["cli"]

[lib]
name = "tiexiu"
crate-type = ["cdylib", "rlib"]

[dev-dependencies]
criterion = { version = "4.4.1", package = "codspeed-criterion-compat" }

[[bench]]
name = "parsing"
harness = false

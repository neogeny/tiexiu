[package]
name = "tiexiu"
version = "0.1.1-alpha.1"
edition = "2024"
authors = ["Juancarlo Añez <apalala@gmail.com>"]
description = "A port of the TatSu PEG parser generator to Rust"
license = "AGPL-3.0-or-later"
repository = "https://github.com/neogeny/tiexiu"
readme = "README.md"
exclude = [
    "pyproject.toml",
    "__pycache__",
]

#[features]
#default = []
#python = ["dep:pyo3"]

[features]
regex = ["dep:regex"]

[dependencies]
regex = { version = "1.10", optional = true }
#pyo3 = { version = "0.28.2", features = ["extension-module"]}
#pyo3 = { version = "0.28.2", features = ["extension-module"], optional = true }

[lib]
name = "tiexiu"
crate-type = ["cdylib", "rlib"]
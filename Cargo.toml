[package]
name = "TieXiu"
version = "0.1.1-alpha.2"
edition = "2024"
authors = ["Juancarlo Añez <apalala@gmail.com>"]
description = "A port of the TatSu PEG parser generator to Rust"
license = "MIT OR Apache-2.0"
repository = "https://github.com/neogeny/tiexiu"
readme = "README.md"
exclude = [
    "pyproject.toml",
    "__pycache__",
]

[features]
bootstrap = ["default"]
default = ["fancy-regex", "serde", "serde_json", "cli"]
transient = ["fancy-regex", "serde", "serde_json", "cli"]

fancy-regex = ["dep:fancy-regex"]
serde = ["dep:serde"]
serde_json = [
    "dep:serde",
    "dep:serde_json",
    "dep:serde_path_to_error",
]

cli = [
    "dep:clap",
    "dep:syntect",
    "dep:owo-colors",
    "dep:bunt",
    "dep:termcolor",
]

[dependencies]
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0.149", optional = true }
serde_path_to_error = { version = "0.1", optional = true }

fancy-regex = { version = "0.17", optional = true }
indexmap = { version = "2.13" }
thiserror = "2.0.18"

clap = { version = "4.6", features = ["derive"], optional = true }
syntect = { version = "5.3.0", optional = true }
owo-colors = { version = "4.0", optional = true, features = ["supports-colors"] }
bunt = { version = "0.2", optional = true }
termcolor = { version = "1.4.1", optional = true }

pyo3 = { version = "0.28", features = ["extension-module"] }

[[bin]]
name = "tiexiu"
path = "src/main.rs"
required-features = ["cli"]

[lib]
name = "tiexiu"
crate-type = ["cdylib", "rlib"]

[dev-dependencies]
criterion = { version = "4.4.1", package = "codspeed-criterion-compat" }

[[bench]]
name = "parsing"
harness = false

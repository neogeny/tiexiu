[package]
name = "tiexiu"
version = "0.1.0"
edition = "2024"
authors = ["Juancarlo A~nez <apalala@gmail.com>"]
description = "A port of the TatSu PEG parser generator to Rust."
license = "AGPL-3.0-or-later"
repository = "https://github.com/neogeni/tiexiu"
readme = "README.md"
#license = "BSD-3-Clause"
exclude = [
    "pyproject.toml",
    "__pycache__",
]

[dependencies]
pyo3 = "0.28.2"

[lib]
name = "libtiexiu"
crate-type = ["cdylib", "rlib"]

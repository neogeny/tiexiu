name: CodSpeed Benchmarks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: rust cache
        uses: swatinem/rust-cache@v2

      # 1. Install the cargo-codspeed orchestration tool
      - name: Install cargo-codspeed
        run: cargo install cargo-codspeed@4.6.0

      # 2. Build the benchmark targets using cargo-codspeed
      - name: Build benchmarks
        run: cargo codspeed build

      # 3. Execute using the correct runner
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          run: cargo codspeed run

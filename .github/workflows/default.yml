name: rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: quality gate (fmt & clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.14'
          enable-cache: false

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: check formatting
        run: cargo fmt --all -- --check

      - name: clippy (strict)
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: build and test
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.14'

      - name: set up rust
        uses: dtolnay/rust-toolchain@stable

      - name: rust cache
        uses: swatinem/rust-cache@v2

      - name: build
        run: cargo build --verbose

      - name: test
        run: cargo test --verbose
